[build-system]
requires = ["scikit-build-core>=0.10", "nanobind>=2.0", "meson>=1.3"]
build-backend = "scikit_build_core.build"

[project]
name = "pdf_to_svg"
version = "0.1.0"
description = "Convert PDF to SVG in-memory using poppler and cairo"
requires-python = ">=3.9"

[project.optional-dependencies]
test = ["pytest"]

[tool.scikit-build]
wheel.packages = ["src/pdf_to_svg"]
cmake.build-type = "Release"

[tool.cibuildwheel]
skip = "*-musllinux*"

[tool.cibuildwheel.linux]
before-all = "yum install -y freetype-devel fontconfig-devel libpng-devel pixman-devel zlib-devel meson ninja-build"
environment = { LD_LIBRARY_PATH = "/project/_deps_install/lib" }
repair-wheel-command = "auditwheel repair -w {dest_dir} {wheel}"

[tool.cibuildwheel.macos]
before-all = "brew install freetype fontconfig libpng pixman meson ninja pkg-config"
environment = { MACOSX_DEPLOYMENT_TARGET = "15.0" }
repair-wheel-command = "DYLD_LIBRARY_PATH={project}/_deps_install/lib delocate-wheel --require-archs {delocate_archs} -w {dest_dir} -v {wheel}"

[tool.cibuildwheel.windows]
before-all = "vcpkg install freetype fontconfig libpng zlib pixman --triplet x64-windows"
environment = { CMAKE_TOOLCHAIN_FILE = "C:/vcpkg/scripts/buildsystems/vcpkg.cmake" }
