[build-system]
requires = ["scikit-build-core>=0.10", "nanobind>=2.0", "meson>=1.3"]
build-backend = "scikit_build_core.build"

[project]
name = "pdf_to_svg"
version = "0.1.0"
description = "Convert PDF to SVG in-memory using poppler and cairo"
requires-python = ">=3.9"

[project.optional-dependencies]
test = ["pytest"]

[tool.scikit-build]
wheel.packages = ["src/pdf_to_svg"]
cmake.build-type = "Release"
